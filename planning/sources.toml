[[sources]]
id = "sample-github-researcher"
title = "Sample GitHub Researcher"
kind = "github_user"
enabled = false
topics = ["browser-exploitation", "cloud-detection"]
notes = "Example GitHub user source. Replace the handle and switch enabled to true when ready."
fetch.handle = "sample-researcher"
fetch.max_events = 20

[[sources]]
id = "sample-security-repo"
title = "Sample Security Repo"
kind = "github_repo"
enabled = false
topics = ["browser-exploitation"]
notes = "Example GitHub repository source."
fetch.repo = "sample-org/security-repo"
fetch.max_releases = 10
fetch.max_tags = 10

[[sources]]
id = "sample-security-rss"
title = "Sample Security RSS"
kind = "rss"
enabled = false
topics = ["cloud-detection"]
notes = "Example RSS source."
fetch.url = "https://example.com/security/feed.xml"
fetch.max_items = 20

[[sources]]
id = "sample-security-blog"
title = "Sample Security Blog"
kind = "web_page"
enabled = false
topics = ["browser-exploitation"]
notes = "Example blog index page."
fetch.url = "https://example.com/research/"
fetch.link_selector = "article a"
fetch.body_selector = "article"
fetch.max_links = 5

[[sources]]
